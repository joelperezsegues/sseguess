  <style>
    /* =========================
      ILLUSTRATIONS — PREMIUM CAROUSEL
      (center bigger + side smaller)
      ========================= */

    .illu {
      padding-top: calc(var(--header-height) + 2.5rem);
      padding-bottom: 3rem;
    }

    /* Slider horizontal */
    .illu__slider {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 82%;
      gap: 1.25rem;

      overflow-x: auto;
      padding: 0 1rem 1rem;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;

      /* hide scrollbar */
      scrollbar-width: none;

      /* premium feel */
      scroll-behavior: smooth;
    }

    .illu__slider::-webkit-scrollbar { display: none; }

    /* Fade nas laterais (tipo “premium”) */
    .illu__slider {
      -webkit-mask-image: linear-gradient(to right,
        transparent 0%,
        black 7%,
        black 93%,
        transparent 100%);
              mask-image: linear-gradient(to right,
        transparent 0%,
        black 7%,
        black 93%,
        transparent 100%);
    }

    /* Cada slide/card */
    .illu__card {
      scroll-snap-align: center;
      border-radius: 22px;
      overflow: hidden;
      position: relative;

      border: 4px solid rgba(40, 40, 40, 0.9);
      background: rgba(0,0,0,0.06);
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);

      /* laterais menores por defeito */
      transform: scale(0.92);
      opacity: 0.75;
      transition: transform .25s ease, opacity .25s ease, box-shadow .25s ease;
    }

    /* centro maior quando está focado/clicado */
    .illu__card:focus-within,
    .illu__card:hover {
      transform: scale(1);
      opacity: 1;
      box-shadow: 0 16px 45px rgba(0,0,0,0.25);
    }

    /* A imagem em formato poster 2:3 (2000x3000) */
    .illu__card img {
      width: 100%;
      aspect-ratio: 2 / 3;
      height: auto;

      /* NÃO corta nada */
      object-fit: contain;
      background: rgba(255,255,255,0.92);

      display: block;
    }

    /* label */
    .illu__label {
      position: absolute;
      left: 14px;
      bottom: 14px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-weight: 600;
      backdrop-filter: blur(6px);
      font-size: 0.95rem;
    }

    /* Desktop: mais cards visíveis */
    @media screen and (min-width: 768px){
      .illu__slider{
        grid-auto-columns: 40%;
        padding: 0 2rem 1rem;
        gap: 1.5rem;
      }
    }

    @media screen and (min-width: 1024px){
      .illu__slider{
        grid-auto-columns: 32%;
      }
    }

    /* Mobile: ainda mais “premium” com espaçamento e centro maior */
    @media screen and (max-width: 480px){
      .illu__slider{
        grid-auto-columns: 88%;
        gap: 1rem;
      }
      .illu__card{
        transform: scale(0.94);
        opacity: 0.82;
      }
      .illu__card:hover,
      .illu__card:focus-within{
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>

  <script>
    const slider = document.getElementById("illuSlider");

    if(slider){

      const cards = Array.from(slider.children);

      // DUPLICAR slides (início e fim)
      cards.forEach(card => {
        const clone = card.cloneNode(true);
        clone.classList.add("clone");
        slider.appendChild(clone);
      });

      slider.scrollLeft = slider.scrollWidth / 2;

      slider.addEventListener("scroll", () => {
        const maxScroll = slider.scrollWidth;
        const current = slider.scrollLeft;

        if (current <= 0) {
          slider.scrollLeft = maxScroll / 2;
        }

        if (current >= maxScroll - slider.offsetWidth) {
          slider.scrollLeft = maxScroll / 2;
        }
      });

    }
  </script>
