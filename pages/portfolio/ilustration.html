  <!-- CSS só desta página -->
  <style>
    /* =========================
      ILLUSTRATIONS — INSANE PREMIUM CAROUSEL
      (center bigger + side smaller + infinite loop + autoplay)
      ========================= */

    .illu {
      padding-top: calc(var(--header-height) + 2.5rem);
      padding-bottom: 3rem;
    }

    .illu__wrap{
      position: relative;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    /* viewport para esconder overflow e ficar “premium” */
    .illu__viewport{
      overflow: hidden;
      border-radius: 28px;
      outline: none;
    }

    /* fade nas laterais */
    .illu__viewport{
      -webkit-mask-image: linear-gradient(to right,
        transparent 0%,
        black 7%,
        black 93%,
        transparent 100%);
              mask-image: linear-gradient(to right,
        transparent 0%,
        black 7%,
        black 93%,
        transparent 100%);
    }

    .illu__slider{
      display: flex;
      gap: 1.25rem;
      padding: 1.25rem 0;

      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-padding: 1rem;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;

      scrollbar-width: none;
      will-change: scroll-position;
    }

    .illu__slider::-webkit-scrollbar{ display: none; }

    /* Card */
    .illu__card{
      flex: 0 0 82%;
      scroll-snap-align: center;

      border-radius: 22px;
      overflow: hidden;
      position: relative;

      border: 4px solid rgba(40, 40, 40, 0.9);
      background: rgba(0,0,0,0.06);
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);

      /* default menor */
      transform: scale(0.90);
      opacity: 0.75;
      transition: transform .22s ease, opacity .22s ease, box-shadow .22s ease, filter .22s ease;
      filter: saturate(.95) contrast(.98);
    }

    /* ativo (centro) */
    .illu__card.is-active{
      transform: scale(1);
      opacity: 1;
      box-shadow: 0 18px 55px rgba(0,0,0,0.28);
      filter: saturate(1) contrast(1);
    }

    /* Imagens 2000x3000 => ratio 2/3 */
    .illu__card img{
      width: 100%;
      aspect-ratio: 2 / 3;
      height: auto;
      object-fit: contain;
      background: rgba(255,255,255,0.92);
      display: block;
    }

    /* label */
    .illu__label{
      position: absolute;
      left: 14px;
      bottom: 14px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-weight: 600;
      backdrop-filter: blur(8px);
      font-size: 0.95rem;
    }

    /* arrows */
    .illu__arrow{
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;

      width: 46px;
      height: 46px;
      border-radius: 999px;
      border: 2px solid rgba(40,40,40,.7);
      background: rgba(255,255,255,.75);
      backdrop-filter: blur(8px);

      font-size: 28px;
      line-height: 40px;
      cursor: pointer;
      user-select: none;
    }
    .illu__arrow--left{ left: .25rem; }
    .illu__arrow--right{ right: .25rem; }
    .illu__arrow:active{ transform: translateY(-50%) scale(.98); }

    /* dots */
    .illu__dots{
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
    }
    .illu__dot{
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 2px solid rgba(40,40,40,.6);
      background: rgba(255,255,255,.5);
      cursor: pointer;
      transition: transform .15s ease, background .15s ease;
    }
    .illu__dot.is-active{
      transform: scale(1.25);
      background: rgba(40,40,40,.75);
    }

    /* Desktop */
    @media screen and (min-width: 768px){
      .illu__card{ flex-basis: 40%; }
      .illu__wrap{ padding: 0 2rem; }
      .illu__slider{ gap: 1.5rem; }
    }
    @media screen and (min-width: 1024px){
      .illu__card{ flex-basis: 32%; }
    }

    /* Mobile micro tweaks */
    @media screen and (max-width: 480px){
      .illu__card{ flex-basis: 88%; }
      .illu__slider{ gap: 1rem; }
    }
  </style>

  <!-- JS do carousel -->
<script>
  const slider = document.getElementById("illuSlider");

  if (slider) {
    // --- SETTINGS ---
    const AUTOPLAY_MS = 6000;     // tempo entre slides (mais alto = mais calmo)
    const CLONE_COUNT = 3;        // quantos clones nas pontas (2-3 costuma ser perfeito)
    const JUMP_THRESHOLD = 10;    // tolerância px para detectar bordas

    // melhora feel no iOS
    slider.style.scrollBehavior = "smooth";

    // pega nos cards originais
    const originals = Array.from(slider.querySelectorAll(".illu__card"));
    const total = originals.length;
    const clones = Math.min(CLONE_COUNT, total);

    // --- cria clones nas pontas (HEAD + TAIL) ---
    const headClones = originals.slice(-clones).map(el => {
      const c = el.cloneNode(true);
      c.setAttribute("data-clone", "1");
      return c;
    });

    const tailClones = originals.slice(0, clones).map(el => {
      const c = el.cloneNode(true);
      c.setAttribute("data-clone", "1");
      return c;
    });

    headClones.reverse().forEach(c => slider.prepend(c));
    tailClones.forEach(c => slider.appendChild(c));

    // depois de inserir clones, recaptura lista completa
    const allCards = Array.from(slider.querySelectorAll(".illu__card"));

    // identifica o primeiro e último ORIGINAL (sem clones)
    const firstOriginal = allCards.find(el => !el.dataset.clone);
    const lastOriginal = [...allCards].reverse().find(el => !el.dataset.clone);

    // posiciona o scroll no 1º original (evita começar nos clones)
    const goToFirstOriginal = () => {
      slider.style.scrollBehavior = "auto";
      slider.scrollLeft = firstOriginal.offsetLeft;
      slider.offsetHeight; // force reflow
      slider.style.scrollBehavior = "smooth";
    };

    // corre quando o layout já está medido
    window.addEventListener("load", goToFirstOriginal);
    // também corre já (caso já esteja carregado)
    setTimeout(goToFirstOriginal, 50);

    // --- helper: acha o card mais “centrado” ---
    const getCenteredCardIndex = () => {
      const centerX = slider.scrollLeft + slider.clientWidth / 2;

      let bestIndex = 0;
      let bestDist = Infinity;

      allCards.forEach((card, i) => {
        const cardCenter = card.offsetLeft + card.offsetWidth / 2;
        const dist = Math.abs(centerX - cardCenter);
        if (dist < bestDist) {
          bestDist = dist;
          bestIndex = i;
        }
      });

      return bestIndex;
    };

    // --- wrap infinito sem “soluço” ---
    const wrapIfNeeded = () => {
      const leftEdge = firstOriginal.offsetLeft;
      const rightEdge = lastOriginal.offsetLeft;

      // se foi demasiado para a esquerda (entrou nos clones do início)
      if (slider.scrollLeft < leftEdge - JUMP_THRESHOLD) {
        slider.style.scrollBehavior = "auto";
        // salta para a posição equivalente nos originais (no fim)
        slider.scrollLeft = lastOriginal.offsetLeft;
        slider.offsetHeight;
        slider.style.scrollBehavior = "smooth";
      }

      // se foi demasiado para a direita (entrou nos clones do fim)
      if (slider.scrollLeft > rightEdge + JUMP_THRESHOLD) {
        slider.style.scrollBehavior = "auto";
        // volta ao começo
        slider.scrollLeft = firstOriginal.offsetLeft;
        slider.offsetHeight;
        slider.style.scrollBehavior = "smooth";
      }
    };

    slider.addEventListener("scroll", () => {
      // throttlezinho leve (para não saltar agressivo)
      window.clearTimeout(slider._wrapTimer);
      slider._wrapTimer = window.setTimeout(wrapIfNeeded, 80);
    }, { passive: true });

    // --- autoplay: avança 1 card por vez, suave ---
    let autoplayTimer = null;
    const startAutoplay = () => {
      stopAutoplay();
      autoplayTimer = setInterval(() => {
        const i = getCenteredCardIndex();
        const next = allCards[i + 1] || allCards[0];
        slider.scrollTo({ left: next.offsetLeft, behavior: "smooth" });
      }, AUTOPLAY_MS);
    };

    const stopAutoplay = () => {
      if (autoplayTimer) clearInterval(autoplayTimer);
      autoplayTimer = null;
    };

    // pausa quando o user interage (evita movimentos bruscos)
    slider.addEventListener("pointerenter", stopAutoplay);
    slider.addEventListener("pointerleave", startAutoplay);

    slider.addEventListener("touchstart", stopAutoplay, { passive: true });
    slider.addEventListener("touchend", () => {
      // espera um bocadinho antes de retomar (para não “brigar” com o swipe)
      setTimeout(startAutoplay, 800);
    }, { passive: true });

    // arranca
    startAutoplay();
  }
</script>
