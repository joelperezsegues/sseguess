<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Usa o teu CSS (mesmo fundo do site) -->
  <link rel="stylesheet" href="/sseguess/assets/css/styles.css" />
  <link href="https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css" rel="stylesheet">

  <title>Illustrations — Joel</title>

  <!-- CSS só desta página -->
  <style>
    /* =========================
      ILLUSTRATIONS — INSANE PREMIUM CAROUSEL
      (center bigger + side smaller + infinite loop + autoplay)
      ========================= */

    .illu {
      padding-top: calc(var(--header-height) + 2.5rem);
      padding-bottom: 3rem;
    }

    .illu__wrap{
      position: relative;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    /* viewport para esconder overflow e ficar “premium” */
    .illu__viewport{
      overflow: hidden;
      border-radius: 28px;
      outline: none;
    }

    /* fade nas laterais */
    .illu__viewport{
      -webkit-mask-image: linear-gradient(to right,
        transparent 0%,
        black 7%,
        black 93%,
        transparent 100%);
              mask-image: linear-gradient(to right,
        transparent 0%,
        black 7%,
        black 93%,
        transparent 100%);
    }

    .illu__slider{
      display: flex;
      gap: 1.25rem;
      padding: 1.25rem 0;

      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-padding: 1rem;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;

      scrollbar-width: none;
      will-change: scroll-position;
    }

    .illu__slider::-webkit-scrollbar{ display: none; }

    /* Card */
    .illu__card{
      flex: 0 0 82%;
      scroll-snap-align: center;

      border-radius: 22px;
      overflow: hidden;
      position: relative;

      border: 4px solid rgba(40, 40, 40, 0.9);
      background: rgba(0,0,0,0.06);
      box-shadow: 0 12px 30px rgba(0,0,0,0.18);

      /* default menor */
      transform: scale(0.90);
      opacity: 0.75;
      transition: transform .22s ease, opacity .22s ease, box-shadow .22s ease, filter .22s ease;
      filter: saturate(.95) contrast(.98);
    }

    /* ativo (centro) */
    .illu__card.is-active{
      transform: scale(1);
      opacity: 1;
      box-shadow: 0 18px 55px rgba(0,0,0,0.28);
      filter: saturate(1) contrast(1);
    }

    /* Imagens 2000x3000 => ratio 2/3 */
    .illu__card img{
      width: 100%;
      aspect-ratio: 2 / 3;
      height: auto;
      object-fit: contain;
      background: rgba(255,255,255,0.92);
      display: block;
    }

    /* label */
    .illu__label{
      position: absolute;
      left: 14px;
      bottom: 14px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-weight: 600;
      backdrop-filter: blur(8px);
      font-size: 0.95rem;
    }

    /* arrows */
    .illu__arrow{
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;

      width: 46px;
      height: 46px;
      border-radius: 999px;
      border: 2px solid rgba(40,40,40,.7);
      background: rgba(255,255,255,.75);
      backdrop-filter: blur(8px);

      font-size: 28px;
      line-height: 40px;
      cursor: pointer;
      user-select: none;
    }
    .illu__arrow--left{ left: .25rem; }
    .illu__arrow--right{ right: .25rem; }
    .illu__arrow:active{ transform: translateY(-50%) scale(.98); }

    /* dots */
    .illu__dots{
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
    }
    .illu__dot{
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 2px solid rgba(40,40,40,.6);
      background: rgba(255,255,255,.5);
      cursor: pointer;
      transition: transform .15s ease, background .15s ease;
    }
    .illu__dot.is-active{
      transform: scale(1.25);
      background: rgba(40,40,40,.75);
    }

    /* Desktop */
    @media screen and (min-width: 768px){
      .illu__card{ flex-basis: 40%; }
      .illu__wrap{ padding: 0 2rem; }
      .illu__slider{ gap: 1.5rem; }
    }
    @media screen and (min-width: 1024px){
      .illu__card{ flex-basis: 32%; }
    }

    /* Mobile micro tweaks */
    @media screen and (max-width: 480px){
      .illu__card{ flex-basis: 88%; }
      .illu__slider{ gap: 1rem; }
    }
  </style>
</head>

<body>

  <!-- HEADER igual -->
  <header class="l-header">
    <nav class="nav bd-grid">
      <a href="/sseguess/index.html" class="nav__logo">JOEL PÉREZ SEGUÉS</a>

      <div class="nav__menu" id="nav-menu">
        <ul class="nav__list">
          <li class="nav__item"><a href="/sseguess/index.html" class="nav__link">Home</a></li>
          <li class="nav__item"><a href="/sseguess/pages/about.html" class="nav__link">About</a></li>
          <li class="nav__item"><a href="/sseguess/pages/portfolio.html" class="nav__link">Portfolio</a></li>
          <li class="nav__item"><a href="/sseguess/pages/illustrations.html" class="nav__link active-link">Illustrations</a></li>
        </ul>
      </div>

      <div class="nav__toggle" id="nav-toggle">

  <main class="l-main illu">
    <section class="section">

      <div class="illu__wrap">
        <button class="illu__arrow illu__arrow--left" type="button" aria-label="Previous">‹</button>

        <div class="illu__viewport" id="illuViewport" tabindex="0" aria-label="Illustrations carousel">
          <div class="illu__slider" id="illuSlider">

            <!-- Slides (os teus paths reais) -->
            <a class="illu__card" href="#" aria-label="Open Orgánica">
              <img src="/sseguess/images/portfolio/ilustrations/dones_d_aigua/1_organica.PNG" alt="Orgánica">
              <div class="illu__label">Orgánica</div>
            </a>

            <a class="illu__card" href="#" aria-label="Open Sòlida">
              <img src="/sseguess/images/portfolio/ilustrations/dones_d_aigua/2_solida.PNG" alt="Sòlida">
              <div class="illu__label">Sòlida</div>
            </a>

            <a class="illu__card" href="#" aria-label="Open Oasis">
              <img src="/sseguess/images/portfolio/ilustrations/dones_d_aigua/3_oasis.PNG" alt="Oasis">
              <div class="illu__label">Oasis</div>
            </a>

            <a class="illu__card" href="#" aria-label="Open Líquida">
              <img src="/sseguess/images/portfolio/ilustrations/dones_d_aigua/4_liquida.PNG" alt="Líquida">
              <div class="illu__label">Líquida</div>
            </a>

            <a class="illu__card" href="#" aria-label="Open Capicua">
              <img src="/sseguess/images/portfolio/ilustrations/dones_d_aigua/5_capicua.PNG" alt="Capicua">
              <div class="illu__label">Capicua</div>
            </a>

            <a class="illu__card" href="#" aria-label="Open Gasosa">
              <img src="/sseguess/images/portfolio/ilustrations/dones_d_aigua/6_gasosa.PNG" alt="Gasosa">
              <div class="illu__label">Gasosa</div>
            </a>

            <a class="illu__card" href="#" aria-label="Open Aquelarre">
              <img src="/sseguess/images/portfolio/ilustrations/dones_d_aigua/7_aqualarre.PNG" alt="Aquelarre">
              <div class="illu__label">Aquelarre</div>
            </a>

            <a class="illu__card" href="#" aria-label="Open Insolubles">
              <img src="/sseguess/images/portfolio/ilustrations/dones_d_aigua/8_insolubles.PNG" alt="Insolubles">
              <div class="illu__label">Insolubles</div>
            </a>

            <a class="illu__card" href="#" aria-label="Open Identitat Col·lectiva">
              <img src="/sseguess/images/portfolio/ilustrations/dones_d_aigua/9_identitat.PNG" alt="Identitat Col·lectiva">
              <div class="illu__label">Identitat Col•lectiva</div>
            </a>

          </div>
        </div>

        <button class="illu__arrow illu__arrow--right" type="button" aria-label="Next">›</button>
      </div>

      <div class="illu__dots" id="illuDots" aria-label="Carousel pagination"></div>
    </section>
  </main>

  <script src="/sseguess/assets/js/main.js"></script>

  <!-- JS do carousel -->
<script>
  document.addEventListener("DOMContentLoaded", () => {

    const slider = document.getElementById("illuSlider");
    const prevBtn = document.querySelector(".illu__arrow--left");
    const nextBtn = document.querySelector(".illu__arrow--right");
    const dotsContainer = document.getElementById("illuDots");

    if (!slider) return;

    const AUTOPLAY_DELAY = 6500;
    const RESUME_DELAY = 1200;
    const CLONES = 2;

    slider.style.scrollBehavior = "smooth";

    let cards = Array.from(slider.querySelectorAll(".illu__card"));
    const total = cards.length;

    // index original
    cards.forEach((card, i) => {
      card.dataset.index = i;
    });

    // criar clones (inicio + fim)
    const headClones = cards.slice(-CLONES).map(c => {
      const clone = c.cloneNode(true);
      clone.dataset.clone = "true";
      clone.dataset.index = c.dataset.index;
      return clone;
    });

    const tailClones = cards.slice(0, CLONES).map(c => {
      const clone = c.cloneNode(true);
      clone.dataset.clone = "true";
      clone.dataset.index = c.dataset.index;
      return clone;
    });

    headClones.reverse().forEach(c => slider.prepend(c));
    tailClones.forEach(c => slider.appendChild(c));

    cards = Array.from(slider.querySelectorAll(".illu__card"));
    const originals = cards.filter(c => !c.dataset.clone);

    function goToStart() {
      slider.style.scrollBehavior = "auto";
      slider.scrollLeft = originals[0].offsetLeft;
      slider.offsetHeight;
      slider.style.scrollBehavior = "smooth";
    }

    goToStart();

    // DOTS
    dotsContainer.innerHTML = "";
    const dots = [];

    for (let i = 0; i < total; i++) {
      const dot = document.createElement("div");
      dot.className = "illu__dot";
      dot.addEventListener("click", () => {
        stopAutoplay();
        scrollToIndex(i);
        setTimeout(startAutoplay, RESUME_DELAY);
      });
      dotsContainer.appendChild(dot);
      dots.push(dot);
    }

    function getCenteredCard() {
      const center = slider.scrollLeft + slider.clientWidth / 2;
      let closest = cards[0];
      let minDist = Infinity;

      cards.forEach(card => {
        const cardCenter = card.offsetLeft + card.offsetWidth / 2;
        const dist = Math.abs(center - cardCenter);
        if (dist < minDist) {
          minDist = dist;
          closest = card;
        }
      });

      return closest;
    }

    function updateActive() {
      const centered = getCenteredCard();
      const index = parseInt(centered.dataset.index);

      cards.forEach(c => c.classList.remove("is-active"));
      centered.classList.add("is-active");

      dots.forEach(d => d.classList.remove("is-active"));
      if (dots[index]) dots[index].classList.add("is-active");

      // se for clone → reposicionar invisível
      if (centered.dataset.clone) {
        const real = originals.find(c => c.dataset.index === centered.dataset.index);
        slider.style.scrollBehavior = "auto";
        slider.scrollLeft = real.offsetLeft;
        slider.offsetHeight;
        slider.style.scrollBehavior = "smooth";
      }
    }

    function scrollToIndex(i) {
      const target = originals[i];
      slider.scrollTo({ left: target.offsetLeft, behavior: "smooth" });
    }

    function next() {
      const centered = getCenteredCard();
      const idx = cards.indexOf(centered);
      const nextCard = cards[idx + 1] || cards[0];
      slider.scrollTo({ left: nextCard.offsetLeft, behavior: "smooth" });
    }

    function prev() {
      const centered = getCenteredCard();
      const idx = cards.indexOf(centered);
      const prevCard = cards[idx - 1] || cards[cards.length - 1];
      slider.scrollTo({ left: prevCard.offsetLeft, behavior: "smooth" });
    }

    slider.addEventListener("scroll", () => {
      clearTimeout(slider._scrollTimer);
      slider._scrollTimer = setTimeout(updateActive, 80);
    }, { passive: true });

    prevBtn.addEventListener("click", () => {
      stopAutoplay();
      prev();
      setTimeout(startAutoplay, RESUME_DELAY);
    });

    nextBtn.addEventListener("click", () => {
      stopAutoplay();
      next();
      setTimeout(startAutoplay, RESUME_DELAY);
    });

    let autoplay = null;

    function startAutoplay() {
      stopAutoplay();
      autoplay = setInterval(() => {
        next();
      }, AUTOPLAY_DELAY);
    }

    function stopAutoplay() {
      if (autoplay) clearInterval(autoplay);
    }

    slider.addEventListener("touchstart", stopAutoplay, { passive: true });
    slider.addEventListener("touchend", () => {
      setTimeout(startAutoplay, RESUME_DELAY);
    }, { passive: true });

    updateActive();
    startAutoplay();

  });
</script>

</body>
