<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ===== CSS ===== -->
    <link rel="stylesheet" href="assets/css/styles.css">

    <!-- ===== BOX ICONS ===== -->
    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.0.5/css/boxicons.min.css" rel="stylesheet">

    <title>Joel Perez Segues</title>

    <style>
        /* Footer background image */
        .footer {
            position: relative;
            text-align: center;
            font-weight: 600;
            color: #fff;
            padding: 2rem 0;
            overflow: hidden;
        }

        .footer-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('assets/img/footheader.jpeg');
            background-size: cover;
            background-position: center;
            opacity: 0.3; /* ajusta a transparência */
            z-index: -1;
        }

        .footer__title, .footer__social, .footer__copy {
            position: relative;
            z-index: 1;
        }

        .footer__social .footer__icon {
            font-size: 1.5rem;
            color: #fff;
            margin: 0 0.5rem;
        }
    </style>
</head>

<body>

<!--===== HEADER =====-->
<header class="l-header">
    <nav class="nav bd-grid">
        <div>
            <a href="index.html" class="nav__logo">Joel</a>
        </div>

        <div class="nav__menu" id="nav-menu">
            <ul class="nav__list">
                <li class="nav__item">
                    <a href="index.html" class="nav__link active-link">Home</a>
                </li>
                <li class="nav__item">
                    <a href="about.html" class="nav__link">About</a>
                </li>
                <li class="nav__item">
                    <a href="portfolio.html" class="nav__link">Portfolio</a>
                </li>
            </ul>
        </div>

        <div class="nav__toggle" id="nav-toggle">
            <i class='bx bx-menu'></i>
        </div>
    </nav>
</header>

<!--===== MAIN =====-->
<main class="l-main">

            <h1 class="home__title">
                Hi,<br>
                I'm <span class="home__title-color">Joel</span><br>
                Web Designer
            </h1>

            <a href="portfolio.html" class="button">View Work</a>
        </div>

        <div class="home__social">
            <!-- LinkedIn -->
            <a href="https://www.linkedin.com/in/joelperezsegues/" target="_blank" class="home__social-icon">
                <i class='bx bxl-linkedin'></i>
            </a>

            <!-- Instagram -->
            <a href="https://www.instagram.com/sseguess" target="_blank" class="home__social-icon">
                <i class='bx bxl-instagram'></i>
            </a>
        </div>

        <div class="home__img">
            <svg class="home__blob"
                 viewBox="0 0 479 467"
                 xmlns="http://www.w3.org/2000/svg">

                <mask id="mask0">
                    <path d="M9.19 145.96C34.02 76.58 114.86 54.73 184.11 29.48C245.8 6.99 311.86 -14.95 370.73 14.14C431.2 44.03 467.94 107.5 477.19 174.31C485.89 237.22 454.93 294.37 416.5 344.95C373.74 401.24 326.06 462.8 255.44 466.18C179.41 469.83 111.55 422.13 65.15 361.8C17.48 299.81 -17.16 219.58 9.19 145.96Z"/>
                </mask>

                    <path d="M9.19 145.96C34.02 76.58 114.86 54.73 184.11 29.48C245.8 6.99 311.86 -14.95 370.73 14.14C431.2 44.03 467.94 107.5 477.19 174.31C485.89 237.22 454.93 294.37 416.5 344.95C373.74 401.24 326.06 462.8 255.44 466.18C179.41 469.83 111.55 422.13 65.15 361.8C17.48 299.81 -17.16 219.58 9.19 145.96Z"/>
                    <image class="home__blob-img"
                           x="50"
                           y="60"
                           href="assets/img/perfil.png"/>
                </g>
            </svg>
        </div>

    </section>

</main>

<!--===== FOOTER =====-->
<footer class="footer">
    <div class="footer-bg"></div>

    <p class="footer__title">Joel</p>

    <div class="footer__social">
        <a href="https://www.instagram.com/sseguess" target="_blank" class="footer__icon"><i class='bx bxl-instagram'></i></a>
        <a href="#" class="footer__icon"><i class='bx bxl-twitter'></i></a>

</footer>

<script src="assets/js/main.js"></script>
